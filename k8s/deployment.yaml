apiVersion: apps/v1
kind: Deployment
metadata:
  name: vendas-veiculo-service
  labels:
    app: vendas-veiculo-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: vendas-veiculo-service
  template:
    metadata:
      labels:
        app: vendas-veiculo-service
    spec:
      containers:
        - name: vendas-veiculo-service
          image: vendas-veiculo-service:latest
          ports:
            - containerPort: 8081
          env:
            - name: DB_HOST
              value: "rds-vendas-endpoint-placeholder"
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: "db_vendas"
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: vendas-veiculo-service-secret
                  key: db-username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: vendas-veiculo-service-secret
                  key: db-password
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: vendas-veiculo-service-secret
                  key: jwt-secret
            - name: HMAC_SECRET
              valueFrom:
                secretKeyRef:
                  name: vendas-veiculo-service-secret
                  key: hmac-secret
            - name: RESERVA_EXPIRACAO_MINUTOS
              value: "10"
            - name: RESERVA_EXPIRACAO_INTERVALO_MS
              value: "60000"
          resources:
            limits:
              cpu: "500m"
              memory: "512Mi"
            requests:
              cpu: "250m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 20
            periodSeconds: 10
