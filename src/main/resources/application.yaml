server:
  port: 8081

spring:
  application:
    name: VendasService
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:db_vendas}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
    enabled: true

jwt:
  secret: ${JWT_SECRET:minha-chave-secreta-m2m-super-secreta-e-longa-para-hmac-sha256}

hmac:
  secret: ${HMAC_SECRET:minha-chave-secreta-hmac-super-secreta-e-longa-para-webhooks}

reserva:
  expiracao:
    minutos: ${RESERVA_EXPIRACAO_MINUTOS:10}
    intervalo-ms: ${RESERVA_EXPIRACAO_INTERVALO_MS:60000}
