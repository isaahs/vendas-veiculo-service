server:
  port: 8081

spring:
  application:
    name: VendasService
  profiles:
    active: dev
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:db_vendas}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
    enabled: true

jwt:
  secret: ${JWT_SECRET:9a7262174c106437a346f906b3a0e67e3dfd36480b2713e33e9d80d2cf34d588}

hmac:
  secret: ${HMAC_SECRET:super-secret-hmac-signature-key-for-webhook-validation-2026}

reserva:
  expiracao:
    minutos: ${RESERVA_EXPIRACAO_MINUTOS:10}
    intervalo-ms: ${RESERVA_EXPIRACAO_INTERVALO_MS:60000}
