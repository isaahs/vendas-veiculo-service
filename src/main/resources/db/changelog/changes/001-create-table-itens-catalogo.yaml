databaseChangeLog:
  - changeSet:
      id: 1
      author: fiap
      changes:
        - createTable:
            tableName: tb_itens_catalogo
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: veiculo_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: marca
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: modelo
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: ano
                  type: int
                  constraints:
                    nullable: false
              - column:
                  name: cor
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: preco
                  type: numeric(19, 2)
                  constraints:
                    nullable: false
              - column:
                  name: placa
                  type: varchar(8)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: status
                  type: varchar(50)
                  constraints:
                    nullable: false
        - createIndex:
            indexName: idx_itens_catalogo_preco
            tableName: tb_itens_catalogo
            columns:
              - column:
                  name: preco
